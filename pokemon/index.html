<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto Pokémon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Catálogo Pokémon</h1>
    
    <div class="controls">
        <input type="text" id="pokemonInput" placeholder="Nombre o ID...">
        <select id="pokemonSelect">
            <option value="">Selecciona uno...</option>
        </select>
        <button id="searchBtn">Buscar</button>
    </div>

    <div id="pokemonCard" class="card">
        <p>Busca un Pokémon para ver su info</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
