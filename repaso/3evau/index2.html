<!DOCTYPE html>
<html>
<head>
    <title>Usuarios API</title>
    <style>
        table { border-collapse: collapse; width: 80%; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        img { width: 50px; border-radius: 4px; }
    </style>
</head>
<body>

<h2 style="text-align:center;">Lista de Usuarios</h2>
<table id="usuarios">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Email</th>
            <th>Avatar</th>
        </tr>
    </thead>
    <tbody>
        <!-- Datos se agregarán aquí -->
    </tbody>
</table>

<script>
const table = document.querySelector("#usuarios tbody");

async function obtenerUsuarios() {
    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/users");
        const data = await response.json();

        data.forEach(user => {
            const fila = document.createElement("tr");

            // Nombre
            const nombreTd = document.createElement("td");
            nombreTd.textContent = user.name;

            // Usuario
            const usernameTd = document.createElement("td");
            usernameTd.textContent = user.username;

            // Email
            const emailTd = document.createElement("td");
            emailTd.textContent = user.email;

            // Avatar (usando un placeholder)
            const avatarTd = document.createElement("td");
            const avatar = document.createElement("img");
            avatar.src = `https://robohash.org/${user.id}?size=50x50`;
            avatar.alt = user.username;
            avatar.onerror = () => { avatar.src = "https://via.placeholder.com/50"; }
            avatarTd.appendChild(avatar);

            fila.appendChild(nombreTd);
            fila.appendChild(usernameTd);
            fila.appendChild(emailTd);
            fila.appendChild(avatarTd);

            table.appendChild(fila);
        });

    } catch (error) {
        console.error("Error al obtener los usuarios:", error);
    }
}

obtenerUsuarios();
</script>

</body>
</html>
